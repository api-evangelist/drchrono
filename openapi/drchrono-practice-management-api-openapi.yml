components:
  schemas:
    TaskTemplate:
      required:
      - name
      type: object
      properties:
        archived:
          type: boolean
          description: ''
          title: Archived
        name:
          type: string
          description: ''
          title: Name
        practice_group:
          readOnly: true
          type: string
          description: ''
          title: Practice group
        default_category:
          type: integer
          description: ''
          title: Default category
        updated_at:
          readOnly: true
          type: string
          description: ''
          title: Updated at
        default_title:
          type: string
          description: ''
          title: Default title
        default_note:
          type: string
          description: ''
          title: Default note
        default_status:
          type: integer
          description: ''
          title: Default status
        id:
          readOnly: true
          type: integer
          description: ''
          title: ID
        default_assignee_group:
          type: integer
          description: ''
          title: Default assignee group
        default_assignee_user:
          type: string
          description: ''
          title: Default assignee user
        default_due_date_offset:
          type: string
          description: Offset due date, format should follow `"[DD] [HH:[MM:]]ss[.uuuuuu]"`
          title: Default due date offset
        created_at:
          readOnly: true
          type: string
          description: ''
          title: Created at
        default_priority:
          enum:
          - '10'
          - '20'
          - '30'
