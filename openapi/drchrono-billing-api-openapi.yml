        name: date_range
        in: query
      - schema:
          type: string
          description: ''
          title: date
        required: false
        description: ''
        name: end_date
        in: query
      tags:
      - Billing
      x-permissions: null
      x-practice-access: '"share_patients" need to be set for data access among practice'
      security: null
      operationId: patient_authorizations_list
      description: Retrieve or search patient authorizations
