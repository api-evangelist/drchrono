openapi: 3.0.0
info:
  version: v4 - Hunt Valley
  description: RESTful API for the drchrono EHR platform providing access to patient records, clinical encounters, appointments, prescriptions, billing, lab orders, and practice administration with OAuth 2.0 authentication and HIPAA-compliant data exchange.
  x-logo:
    url: https://www.drchrono.com/site_media/images/logos/drchrono-black-wpadding.png
    altText: DrChrono Logo
  title: DrChrono EHR REST Administrative Billing API
servers:
- url: https://app.drchrono.com
tags:
- description: Create and manage billing resources
  name: Billing
paths:
  /api/day_sheet_charges:
    get:
      description: Retrieve daysheet charges report for a given date range
      parameters:
      - schema:
          type: string
          description: Start date of report (M/D/YYYY)
          title: start_date
        required: true
        name: start_date
        in: query
      - schema:
          type: string
          description: End date of report (M/D/YYYY)
          title: end_date
        required: true
        name: end_date
        in: query
      - schema:
          type: string
          description: Filters report by scheduled time or date of entry if not provided. Can be one of ('scheduled_time', ' ')
          title: charges_date_type
        required: false
        name: charges_date_type
        in: query
      - schema:
          type: string
          description: Filters report by given value. Can be one of ('reimbursement_analysis', ' ')
          title: report_type
        required: false
        name: report_type
        in: query
      - schema:
          type: string
          description: Filters report by professional or institutional claims. Can be one of ('institutional', 'professional', ' ')
          title: claim_type
        required: false
        name: claim_type
        in: query
      - schema:
          type: integer
          description: Filters report by a given patient ID
          title: patient_id
        required: false
        name: patient_id
        in: query
      - schema:
          type: string
          description: Filters report by a given office
          title: office
        required: false
        name: office_id
        in: query
      - schema:
          type: integer
          description: Filters report by a given examroom ID
          title: examroom_id
        required: false
        name: examroom_id
        in: query
      - schema:
          type: boolean
          description: Runs report for all providers in the practice group
          title: pg_mode
        required: false
        name: pg_mode
        in: query
      tags:
      - Billing
      x-permissions:
      - billing
      - access-patient-payments
      security:
      - drchrono_oauth2:
        - billing
      operationId: daysheet_charges_list
  /api/eligibility_checks:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                title: ''
                type: object
                description: Paginated Result
                properties:
                  previous:
                    type: string
                    description: Previous paginated page
                    title: previous
                  data:
                    items:
                      $ref: '#/components/schemas/Coverage'
                    type: array
                    description: result data
                    title: data
                  next:
                    type: string
                    description: Next Paginated page
                    title: next
          description: OK
        '405':
          content: {}
          description: Method Not Allowed
        '404':
          content: {}
          description: Not Found
        '403':
          content: {}
          description: Permission Denied
        '401':
          content: {}
          description: Unauthorized
        '400':
          content: {}
          description: Bad Request
        '500':
          content: {}
          description: Internal Server Error
      parameters:
      - schema:
          type: string
          description: The pagination cursor value.
          title: Cursor
        required: false
        name: cursor
        in: query
      - schema:
          type: integer
          description: Number of results to return per page.
          title: Page size
        required: false
        name: page_size
        in: query
      - schema:
          type: integer
          description: ''
          title: appointment
        required: false
        description: ''
        name: appointment
        in: query
      - schema:
          type: string
          description: ''
          title: appointment_date
        required: false
        description: ''
        name: appointment_date
        in: query
      - schema:
          type: integer
          description: ''
          title: doctor
        required: false
        description: ''
        name: doctor
        in: query
      - schema:
          type: string
          description: ''
          title: query_date_range
        required: false
        description: ''
        name: query_date_range
        in: query
      - schema:
          type: string
          description: ''
          title: appointment_date_range
        required: false
        description: ''
        name: appointment_date_range
        in: query
      - schema:
          type: string
          description: ''
          title: query_date
        required: false
        description: ''
        name: query_date
        in: query
      - schema:
          type: integer
          description: ''
          title: patient
        required: false
        description: ''
        name: patient
        in: query
      tags:
      - Billing
      x-permissions:
      - scheduling
      - manage-patients
      x-practice-access: '"share_patients" need to be set for data access among practice'
      security:
      - drchrono_oauth2:
        - calendar:read
        - calendar:write
        - patients:read
        - patients:write
      operationId: eligibility_checks_list
      description: Retrieve or search past eligibility checks for patient
