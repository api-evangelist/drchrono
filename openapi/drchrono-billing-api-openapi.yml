      description: Retrieve an existing custom insurance plan name
  /api/line_items_list:
    post:
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    description: 'Status of the request.  Possible values are "In progress", "Complete", "Failed", "Canceled".

                      '
                    title: status
                  uuid:
