          content: {}
          description: Method Not Allowed
        '404':
          content: {}
          description: Not Found
        '403':
          content: {}
          description: Permission Denied
        '401':
          content: {}
          description: Unauthorized
        '400':
          content: {}
          description: Bad Request
        '500':
          content: {}
          description: Internal Server Error
      parameters:
      - schema:
          type: string
          title: order_by
        required: false
        description: 'Order results by a specific field. Valid options include [id, updated_at]. Default: id.'
        name: order_by
        in: query
      - schema:
          type: integer
          description: Number of results to return per page.
          title: Page size
        required: false
        name: page_size
        in: query
      - schema:
          type: string
          description: Date of billing line item creation
          title: posted_date
        required: false
        description: ''
        name: posted_date
        in: query
      - schema:
          type: integer
          description: Patient associated with the billing line item
          title: patient
        required: false
        description: ''
        name: patient
        in: query
      - schema:
          type: integer
          description: Office associated with the billing line item
          title: office
        required: false
        description: ''
        name: office
        in: query
      - schema:
          type: integer
          description: ''
          title: doctor
        required: false
        description: ''
        name: doctor
        in: query
      - schema:
          type: string
          description: ''
          title: since
        required: false
        description: ''
        name: since
        in: query
      - schema:
          type: integer
          description: ''
          title: appointment
        required: false
        description: ''
        name: appointment
        in: query
      - schema:
          type: string
          description: Date on which the service was rendered
          title: service_date
        required: false
        description: ''
        name: service_date
        in: query
      - schema:
          type: string
          description: Bounded date range in which the service was rendered
          title: service_date_range
        required: false
        description: ''
        name: service_date_range
        in: query
      tags:
      - Billing
      x-permissions:
      - billing
      - show-billing-tab
      x-practice-access: '"share_patients" need to be set for data access among practice'
      security:
      - drchrono_oauth2:
        - billing:read
      operationId: line_items_list_create
      description: Create a billing line items list request
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                title: ''
                type: object
                description: Paginated Result
                properties:
                  status:
                    type: string
                    description: 'Status of the request.  Possible values are "In progress", "Complete", "Failed", "Canceled".

                      '
                    title: status
                  results:
                    items:
                      $ref: '#/components/schemas/BillingLineItem'
                    type: array
                    description: result data. only presented when the status is "completed"
                    title: data
                  uuid:
                    type: string
                    description: UUID of the batch of billing line items.
                    title: uuid
          description: OK
        '405':
          content: {}
          description: Method Not Allowed
        '404':
          content: {}
          description: Not Found
        '403':
          content: {}
          description: Permission Denied
        '401':
          content: {}
          description: Unauthorized
        '400':
          content: {}
          description: Bad Request
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncResourceError'
          description: Internal Server Error
      parameters:
      - schema:
          type: string
          description: ''
          title: uuid
        required: false
        description: 'The UUID token for the batch of patients.  This is returned in the response of the create endpoint.

          '
        name: uuid
        in: query
      tags:
      - Billing
      x-permissions:
      - billing
      - show-billing-tab
      x-practice-access: '"share_patients" need to be set for data access among practice'
      security:
      - drchrono_oauth2:
        - billing:read
      operationId: line_items_list_list
      description: Retrieve the list of billing line items
