components:
  schemas:
    WorkHours:
      type: object
      properties:
        start_time:
          type: string
          description: start time of the work hour
          title: Start time
        enabled:
          type: boolean
          description: whether the work hour is enabled
          title: Enabled
        id:
          readOnly: true
          type: integer
          description: unique ID of the work hour
          title: ID
        end_time:
          type: string
          description: end time of the work hour
          title: End time
    UserProfile:
      required: []
      type: object
      properties:
        username:
          type: string
          description: ''
          title: Username
        doctor:
          readOnly: true
          type: string
          description: For staff members, this is their primary physician's ID. For doctors, it is their own ID.
          title: Doctor
        practice_group:
          readOnly: true
          type: string
          description: The ID of the practice group this user belongs to. This can be used to identify users in the same practice.
          title: Practice group
        is_doctor:
          readOnly: true
          type: string
          description: Mutually exclusive with `is_staff`
          title: Is doctor
        is_staff:
          readOnly: true
          type: string
          description: Mutually exclusive with `is_doctor`
          title: Is staff
        id:
          readOnly: true
          type: string
          description: ''
          title: Id
        permissions:
          readOnly: true
          type: string
          description: Permissions the user has.
          title: Permissions
      x-verbose-required: []
    UserProfilesGroup:
      required: []
      type: object
      properties:
        archived:
          readOnly: true
          type: boolean
          description: Group is archived or not
          title: Archived
        name:
          readOnly: true
          type: string
          description: ''
          title: Name
        practice_group:
          readOnly: true
          type: string
          description: Practice group this user group belongs to
          title: Practice group
        created_at:
          type: string
          description: ''
          title: Created at
        updated_at:
          type: string
          description: ''
          title: Updated at
        members:
          items:
            type: string
            description: ID of `/api/users`
            title: ''
          readOnly: true
          type: array
          description: Users in this user group.
          title: Members
        id:
          readOnly: true
          type: integer
          description: ''
          title: ID
      x-verbose-required: []
    WorkSchedule:
      type: object
      properties:
        work_days:
          items:
            $ref: '#/components/schemas/WorkDay'
          type: array
          description: work days of the work schedule
          title: Work days
        id:
          readOnly: true
          type: integer
          description: unique ID for the work schedule
          title: ID
        office:
          type: integer
          description: ID of office for work schedule
          title: Office
        doctor:
          type: integer
          description: ID of doctor for work schedule
          title: Office
    WorkDay:
      type: object
      properties:
        iso_weekday:
          type: string
          description: Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday
          title: ISO weekday
        enabled:
          type: boolean
          description: whether the work day is enabled
          title: Enabled
        id:
          readOnly: true
          type: integer
          description: unique ID of the work day
          title: ID
        work_hours:
          items:
            $ref: '#/components/schemas/WorkHours'
          type: array
          description: work hours of the work day
          title: Work hours
    DoctorOptions:
      required: []
      type: object
      properties:
        default_supervising_provider:
          type: integer
          description: ID of an `/api/doctors` instance.
          title: Supervising provider
        doctor:
          type: integer
          description: ID of an `/api/doctors` instance.
          title: Doctor
        updated_at:
          readOnly: true
          type: string
          description: ''
          title: Updated at
        patient_statement_office:
          type: integer
          description: ID of an `/api/offices` instance.
          title: Patient statement office
        allowed_payment_methods:
          type: array
          description: ''
          title: Allowed Payment Methods
        default_report:
          type: integer
          description: ID of an `/api/clinical_note_templates` instance.
          title: Default Report
        default_billing_provider:
          type: integer
          description: ID of an `/api/doctors` instance.
          title: Billing provider
        default_reminder_profile:
          type: integer
          description: ID of an `/api/reminder_profiles` instance.
          title: Default Reminder profile
        enable_everhealth_scribe:
          readOnly: true
          type: boolean
          description: Whether the EverHealth Scribe feature is enabled for this doctor.
          title: Enable EverHealth Scribe
        office_for_lab_results:
          type: integer
          description: ID of an `/api/offices` instance.
          title: Office for lab results
        erx_supervising_providers:
          items:
            type: integer
          type: array
          description: Array or IDs of `/api/doctors` instances.
          title: Supervising providers
        iframe_apps:
          items:
            type: string
          type: array
          description: Integrated applications
          title: Integrated applications
        id:
          readOnly: true
          type: integer
          description: ''
          title: ID
      x-verbose-required: []
    Doctor:
      required: []
      type: object
      properties:
        website:
          type: string
          description: ''
          title: Website
        doctor_work_schedule:
          $ref: '#/components/schemas/WorkSchedule'
          description: Doctor work schedule (beta)
          title: Doctor Work Schedule
